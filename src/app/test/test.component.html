<mat-checkbox
           [checked]="allChecked"
           [indeterminate]="isFewSelected()"
           (change)="setAll($event.checked)">
                    {{skill.name}}
 </mat-checkbox>

<ul>
  <li *ngFor="let subskill of skill.subskills">
    <mat-checkbox
         [(ngModel)]="subskill.selected"
         (ngModelChange)="updateAllComplete()">
             {{subskill.name}} = {{subskill.selected}}
    </mat-checkbox>
</li>
</ul>
